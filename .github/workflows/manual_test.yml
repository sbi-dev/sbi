name: Manual-Test

on:
  workflow_dispatch:
    inputs:
      pytest-marker:
        description: "Combination of markers to restrict the tests, use '' to run all tests."
        type: choice
        options:
          - 'not slow and not gpu'
          - 'not gpu'
          - 'not slow'
          - ''
        default: ''
        required: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: manual-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10']
        torch-version: ['1.13', '2.5']

    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
        lfs: false
        persist-credentials: false

    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies with uv
      run: |
        uv pip install torch==${{ matrix.torch-version }} --extra-index-url https://download.pytorch.org/whl/cpu
        uv pip install -e .[dev]

    - name: Run the selected tests without coverage
      env:
        PYTEST_MARKER: ${{ inputs.pytest-marker }}
      run: |
        uv run pytest -v -x -m "$PYTEST_MARKER" tests/
