name: Manual-Test

on:
  workflow_dispatch:
    inputs:
      pytest-marker:
        description: "Combination of markers to restrict the tests, use '' to run all tests."
        type: choice
        options:
          - 'not slow and not gpu'
          - 'not gpu'
          - 'not slow'
          - ''
        default: ''
        required: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: manual-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10']
        torch-version: ['1.13', '2.5']

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        lfs: false
        persist-credentials: false

    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies with uv
      run: |
        uv pip install torch==${{ matrix.torch-version }} --extra-index-url https://download.pytorch.org/whl/cpu
        uv pip install -e .[dev]

    - name: Run the selected tests without coverage
      env:
        PYTEST_MARKER: ${{ inputs.pytest-marker }}
      run: |
        uv run pytest -v -x -m "$PYTEST_MARKER" tests/
